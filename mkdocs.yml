site_name: snforacle
site_description: Smith normal form, Hermite normal form, and elementary divisors for integer, polynomial, and finite-field matrices via a uniform Python API.
site_url: https://antieau.github.io/snforacle
repo_url: https://github.com/antieau/snforacle
repo_name: antieau/snforacle

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: .
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Input Formats: input-formats.md
  - Backends: backends.md
  - API Reference:
    - Integer Matrices: api/integer.md
    - Finite-Field Matrices: api/finite-field.md
    - Polynomial Matrices: api/polynomial.md
  - Contributing: contributing.md
  - Changelog: changelog.md
