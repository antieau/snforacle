name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install ".[dev,cypari2,flint]"

      - name: Run tests
        # sage and magma are not available on GitHub-hosted runners;
        # their test files use pytestmark skipif so they are auto-skipped.
        run: pytest tests/ --cov=snforacle --cov-report=term-missing -q

  docs:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: pip install ".[docs,cypari2,flint]"

      - name: Deploy docs to GitHub Pages
        run: mkdocs gh-deploy --force
